<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REXZY STORE - FF ID CANTIK</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .filter-container { margin-bottom: 25px; display: flex; justify-content: center; gap: 10px; }
        .btn-filter { background: #1a2233; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .btn-filter.active { background: #34b7f1; box-shadow: 0 0 15px #34b7f1; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .item-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; width: 160px; display: none; transition: 0.3s; position: relative; }
        
        /* Label Tipe: RARE / BASIC */
        .label-type { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .rare .label-type { background: #f39c12; color: black; }
        .basic .label-type { background: #34495e; color: white; }
        
        /* Label Status: Available / Sold Out */
        .status-badge { font-size: 9px; font-weight: bold; margin-bottom: 10px; display: inline-block; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
        .status-available { color: #2ecc71; border: 1px solid #2ecc71; }
        .status-sold { color: #e74c3c; border: 1px solid #e74c3c; }

        h3 { font-size: 16px; margin: 10px 0; }
        .price { color: #34b7f1; font-weight: bold; margin-bottom: 15px; display: block; }
        
        /* Tombol Beli */
        .btn-buy { background: white; color: black; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; text-decoration: none; display: inline-block; box-sizing: border-box; }
        
        /* Gaya jika sudah SOLD OUT */
        .sold-out { opacity: 0.6; grayscale: 100%; pointer-events: none; }
        .sold-out .btn-buy { background: #333; color: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>REXZY STORE</h1>
    <p>PENYETOKNYA ID CANTIK</p>

    <div class="filter-container">
        <button class="btn-filter active" onclick="filterSelection('all')">SEMUA</button>
        <button class="btn-filter" onclick="filterSelection('basic')">BASIC</button>
        <button class="btn-filter" onclick="filterSelection('rare')">RARE</button>
    </div>

    <div class="container">
        <!-- CONTOH STATUS AVAILABLE (Gunakan format ini untuk ID yang masih ada) -->
        <div class="item-card rare">
            <span class="label-type">RARE</span>
            <span class="status-badge status-available">AVAILABLE</span>
            <h3>15612319999</h3>
            <span class="price">Rp 50.000</span>
            <a href="https://wa.me/62881022715729?text=Assalamualaikum%20apakah%20id%20ini%20masih%20ada%2015612319999?" class="btn-buy">BELI</a>
        </div>

        <!-- CONTOH STATUS SOLD OUT (Tambahkan class "sold-out" pada item-card) -->
        <div class="item-card rare sold-out">
            <span class="label-type">RARE</span>
            <span class="status-badge status-sold">SOLD OUT</span>
            <h3>15596988888</h3>
            <span class="price">TERJUAL</span>
            <a href="#" class="btn-buy">SOLD</a>
        </div>

        <!-- STOK LAINNYA (AVAILABLE) -->
        <div class="item-card rare">
            <span class="label-type">RARE</span>
            <span class="status-badge status-available">AVAILABLE</span>
            <h3>15612299990</h3>
            <span class="price">Rp 50.000</span>
            <a href="https://wa.me/62881022715729?text=Assalamualaikum%20apakah%20id%20ini%20masih%20ada%2015612299990?" class="btn-buy">BELI</a>
        </div>

        <div class="item-card basic">
            <span class="label-type">BASIC</span>
            <span class="status-badge status-available">AVAILABLE</span>
            <h3>15524000039</h3>
            <span class="price">Rp 35.000</span>
            <a href="https://wa.me/62881022715729?text=Assalamualaikum%20apakah%20id%20ini%20masih%20ada%2015524000039?" class="btn-buy">BELI</a>
        </div>
    </div>

    <script>
        function filterSelection(c) {
            var x, i;
            x = document.getElementsByClassName("item-card");
            if (c == "all") c = "";
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
                if (x[i].className.indexOf(c) > -1) {
                    x[i].style.display = "block";
                }
            }
        }

        var btnContainer = document.querySelector(".filter-container");
        var btns = btnContainer.getElementsByClassName("btn-filter");
        for (var i = 0; i < btns.length; i++) {
            btns[i].addEventListener("click", function() {
                var current = document.getElementsByClassName("active");
                current[0].className = current[0].className.replace(" active", "");
                this.className += " active";
            });
        }
        
        filterSelection("all");
    </script>
</body>
</html>
